name: HMT Watch Checker

on:
  schedule:
    # Every 4 hours. These UTC times = 5:30 AM / 9:30 AM / 1:30 PM / 5:30 PM / 9:30 PM / 1:30 AM IST
    - cron: "0 0,4,8,12,16,20 * * *"

  workflow_dispatch:

jobs:
  check-watches:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 \
            libatk1.0-0t64 libatk-bridge2.0-0t64 \
            libcups2t64 libdrm2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64 \
            fonts-liberation xdg-utils

      - name: Install Playwright Chromium browser
        run: playwright install chromium

      - name: Run HMT scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug_page.html
            debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit updated seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push

name: HMT Watch Checker

on:
  schedule:
    # Every 4 hours. These UTC times = 5:30 AM / 9:30 AM / 1:30 PM / 5:30 PM / 9:30 PM / 1:30 AM IST
    - cron: "0 0,4,8,12,16,20 * * *"

  # Lets you trigger a manual run from the Actions tab anytime
  workflow_dispatch:

jobs:
  check-watches:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers (Chromium only)
        run: playwright install chromium --with-deps

      - name: Run HMT scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Upload debug files (always, for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug_page.html
            debug_screenshot.png
          if-no-files-found: ignore

      - name: Commit updated seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
